name: IdrisDb Plus CI

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  format:
    name: Check formatting
    runs-on: ubuntu-latest
    # if: ${{ false }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ secrets.FLUTTER_VERSION }}
          cache: true
      - name: Format code
        run: dart format .
      - name: Check for changes
        id: verify-changed-files
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      - name: Commit formatted files
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "style: auto-format code"
          git push

  lint:
    name: Check lints
    runs-on: ubuntu-latest
    # if: ${{ false }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ secrets.FLUTTER_VERSION }}
          cache: true
      - name: Enable Swift Package Manager
        run: flutter config --enable-swift-package-manager
      - run: dart pub get
        working-directory: packages/idris_db
      - run: flutter pub get
        working-directory: packages/idris_db_flutter_libs
      - run: flutter pub get
        working-directory: packages/idris_db_inspector
      - run: |
          flutter pub get
          flutter pub run build_runner build
          dart tool/generate_all_tests.dart
        working-directory: packages/idris_db_test
      - name: Lint
        run: flutter analyze
        working-directory: packages

  test_core:
    name: Core Test
    runs-on: ubuntu-latest
    # if: ${{ false }}
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Build
        uses: ./.github/actions/prepare-build
      - name: Run Rust Unit tests
        run: cargo test

  test:
    name: Dart Test (${{ matrix.os }})
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    # if: ${{ false }}
    steps:
      - run: echo "$OSTYPE"
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          cache: true
      - name: Enable Swift Package Manager
        run: flutter config --enable-swift-package-manager
      - name: Prepare Build
        uses: ./.github/actions/prepare-build
      - name: Build IdrisDb Core
        run: sh tool/build.sh
      - name: Prepare Tests
        run: sh tool/prepare_tests.sh
      - name: Run Flutter Unit tests
        run: flutter test -j 1
        working-directory: packages/idris_db_test

  test_web:
    name: Dart Web Test
    runs-on: ubuntu-latest
    # if: ${{ false }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          cache: true
      - name: Enable Swift Package Manager
        run: flutter config --enable-swift-package-manager
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-serve
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Prepare Build
        uses: ./.github/actions/prepare-build
      - name: Build IdrisDb Core
        run: bash tool/build_wasm.sh
      - name: Serve IdrisDb.wasm
        run: npx --yes serve --cors -p 3000 &
      - name: Prepare Tests
        run: sh tool/prepare_tests.sh
      - name: Run Dart Unit tests
        run: dart test -p chrome
        working-directory: packages/idris_db_test

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    # if: ${{ false }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          cache: true
      - name: Enable Swift Package Manager
        run: flutter config --enable-swift-package-manager
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-serve
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Prepare Build
        uses: ./.github/actions/prepare-build
      - name: Build IdrisDb Core
        run: sh tool/build.sh
      - name: Build WASM
        run: bash tool/build_wasm.sh
      - name: Prepare Tests
        run: sh tool/prepare_tests.sh
      - name: Add packages
        run: |
          flutter pub add json_annotation
          echo "" >> pubspec.yaml
          echo "dependency_overrides:" >> pubspec.yaml
          echo "  idris_db_flutter_libs:" >> pubspec.yaml
          echo "    path: ../idris_db_flutter_libs" >> pubspec.yaml
          flutter pub add idris_db_test --path ../idris_db_test
          flutter pub get
        working-directory: packages/idris_db
      - name: Collect idris_db_test Coverage (Native)
        run: |
          flutter test --coverage ../idris_db_test/test --coverage-path lcov_idris_db_test.info
        working-directory: packages/idris_db
      - name: Serve IdrisDb.wasm
        run: npx --yes serve --cors -p 3000 &
      - name: Wait for serve
        run: sleep 3
      - name: Collect idris_db_test Coverage (Web)
        run: |
          dart test --coverage=coverage_web -p chrome -j 1 --timeout 300s test/all_tests.dart || true
          if [ -d "coverage_web" ]; then
            dart pub global activate coverage
            dart pub global run coverage:format_coverage \
              --lcov \
              --in=coverage_web \
              --out=../idris_db/lcov_idris_db_test_web.info \
              --report-on=../idris_db/lib \
              --packages=.dart_tool/package_config.json || true
            rm -rf coverage_web
          fi
        working-directory: packages/idris_db_test
      - name: Collect idris_db_core Coverage
        run: |
          cargo install cargo-tarpaulin
          cargo tarpaulin -o Lcov --engine llvm
      - name: Upload idris_db_test Coverage (Native)
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/idris_db/lcov_idris_db_test.info
          flags: IdrisDb
      - name: Upload idris_db_test Coverage (Web)
        uses: codecov/codecov-action@v3
        if: ${{ hashFiles('packages/idris_db/lcov_idris_db_test_web.info') != '' }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/idris_db/lcov_idris_db_test_web.info
          flags: IdrisDb-web
      - name: Upload idris_db_core Coverage
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: core

  test_generator:
    name: Generator Test
    runs-on: ubuntu-latest
    # if: ${{ false }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          cache: true
      - name: Enable Swift Package Manager
        run: flutter config --enable-swift-package-manager
      - name: Run Generator Unit tests
        run: |
          dart pub get
          dart test
        working-directory: packages/idris_db

  integration_test_chrome:
    name: Integration Test Chrome
    runs-on: ubuntu-latest
    # if: ${{ false }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          cache: true
      - name: Enable Swift Package Manager
        run: flutter config --enable-swift-package-manager
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-serve
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Prepare Build
        uses: ./.github/actions/prepare-build
      - name: Build IdrisDb Core
        run: bash tool/build_wasm.sh
      - name: Serve IdrisDb.wasm
        run: npx --yes serve --cors -p 3000 &
      - name: Install chromedricer
        uses: nanasess/setup-chromedriver@v2
      - name: Prepare chromedricer
        run: chromedriver --port=4444 &
      - name: Run Dart tests in browser
        run: |
          flutter pub get
          dart tool/generate_long_double_test.dart
          dart tool/generate_all_tests.dart
          flutter pub run build_runner build
          flutter drive --driver=integration_driver.dart  --target=integration_test/IDRISDB_test.dart -d web-server --browser-name chrome
        working-directory: packages/idris_db_test

  integration_test_firefox:
    name: Integration Test Firefox
    runs-on: ubuntu-latest
    # if: ${{ false }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          cache: true
      - name: Enable Swift Package Manager
        run: flutter config --enable-swift-package-manager
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-serve
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Prepare Build
        uses: ./.github/actions/prepare-build
      - name: Build IdrisDb Core
        run: bash tool/build_wasm.sh
      - name: Serve IdrisDb.wasm
        run: npx --yes serve --cors -p 3000 &
      - name: Install geckodriver
        uses: browser-actions/setup-geckodriver@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare geckodriver
        run: geckodriver --port=4444 &
      - name: Run Dart tests in browser
        run: |
          flutter pub get
          dart tool/generate_long_double_test.dart
          flutter pub run build_runner build
          dart tool/generate_all_tests.dart
          flutter drive --driver=integration_driver.dart --target=integration_test/IDRISDB_test.dart -d web-server --browser-name firefox
        working-directory: packages/idris_db_test

  integration_test_safari:
    name: Integration Test Safari
    runs-on: macos-latest
    # if: ${{ false }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          cache: true
      - name: Enable Swift Package Manager
        run: flutter config --enable-swift-package-manager
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-serve
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Prepare Build
        uses: ./.github/actions/prepare-build
      - name: Build IdrisDb Core
        run: |
          brew install llvm
          bash tool/build_wasm.sh
      - name: Serve IdrisDb.wasm
        run: npx --yes serve --cors -p 3000 &
      - name: Prepare safaridriver
        run: |
          sudo safaridriver --enable
          safaridriver --port=4444 &
      - name: Run Dart tests in browser
        run: |
          flutter pub get
          dart tool/generate_long_double_test.dart
          flutter pub run build_runner build
          dart tool/generate_all_tests.dart
          flutter drive --driver=integration_driver.dart --target=integration_test/IDRISDB_test.dart -d web-server --browser-name safari
        working-directory: packages/idris_db_test

  integration_test_android:
    name: Integration Test Android
    runs-on: ubuntu-latest
    # if: ${{ false }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "zulu"
      - uses: subosito/flutter-action@v2
        with:
          cache: true
      - name: Enable Swift Package Manager
        run: flutter config --enable-swift-package-manager
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Prepare Build
        uses: ./.github/actions/prepare-build
      - name: Build IdrisDb Core
        run: |
          bash tool/build_android.sh x64
          mkdir -p packages/idris_db_flutter_libs/android/src/main/jniLibs/x86_64
          mv libIDRISDB_android_x64.so packages/idris_db_flutter_libs/android/src/main/jniLibs/x86_64/libIDRISDB.so
      - name: Prepare Tests
        run: sh tool/prepare_tests.sh
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          df -h
      - name: Run Flutter Integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: pixel
          target: default
          disk-size: 6000M
          ram-size: 2048M
          heap-size: 512M
          working-directory: packages/idris_db_test
          script: flutter test integration_test/IDRISDB_test.dart --dart-define STRESS=true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim

  integration_test_macos:
    name: Integration Test macOS
    runs-on: macos-latest
    needs: build_darwin
    # if: ${{ false }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          cache: true
      - name: Prepare Build
        uses: ./.github/actions/prepare-build
      - name: Download XCFramework
        uses: actions/download-artifact@v4
        with:
          name: IDRISDBPlusCore.xcframework.zip
          path: .
      - name: Extract XCFramework
        run: unzip -o IDRISDBPlusCore.xcframework.zip -d packages/idris_db_flutter_libs/darwin/idris_db_flutter_libs/Core/
      - name: Prepare Tests
        run: sh tool/prepare_tests.sh
      - name: Run Flutter Driver tests
        run: |
          flutter config --enable-macos-desktop
          flutter config --enable-swift-package-manager
          sed -i '' 's/url: ".*"/path: "Core\/IDRISDBPlusCore.xcframework"/' ../idris_db_flutter_libs/darwin/idris_db_flutter_libs/Package.swift
          sed -i '' '/checksum: .*/d' ../idris_db_flutter_libs/darwin/idris_db_flutter_libs/Package.swift

          flutter test -d macos integration_test/IDRISDB_test.dart --dart-define STRESS=true 2>&1 | tee /tmp/flutter_test_output.txt

          if grep -q "tests failed" /tmp/flutter_test_output.txt; then
            echo "Some tests failed."
            exit 1
          elif grep -q "tests passed" /tmp/flutter_test_output.txt; then
            echo "All tests passed."
            exit 0
          else
            echo "No test result summary found — unexpected output."
            exit 1
          fi
        working-directory: packages/idris_db_test

  integration_test_linux:
    name: Integration Test Linux
    runs-on: ubuntu-latest
    # if: ${{ false }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          cache: true
      - name: Enable Swift Package Manager
        run: flutter config --enable-swift-package-manager
      - name: Prepare Build
        uses: ./.github/actions/prepare-build
      - name: Install Linux requirements
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
      - name: Setup headless display
        run: |
          sudo apt-get install -y xvfb libgl1
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
      - name: Build IdrisDb Core
        run: |
          bash tool/build_linux.sh x64
          mv libIDRISDB_linux_x64.so packages/idris_db_flutter_libs/linux/libIDRISDB.so
      - name: Prepare Tests
        run: sh tool/prepare_tests.sh
      - name: Run Flutter Driver tests
        run: |
          flutter config --enable-linux-desktop 
          flutter test -d linux integration_test/IDRISDB_test.dart --dart-define STRESS=true
        working-directory: packages/idris_db_test

  integration_test_windows:
    name: Integration Test Windows
    # if: ${{ false }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          cache: true
      - name: Enable Swift Package Manager
        run: flutter config --enable-swift-package-manager
      - name: Prepare Build
        uses: ./.github/actions/prepare-build
      - name: Build IdrisDb Core
        run: |
          bash tool/build_windows.sh x64
          mv IDRISDB_windows_x64.dll packages/idris_db_flutter_libs/windows/IdrisDb.dll
      - name: Prepare Tests
        run: sh tool/prepare_tests.sh
      - name: Run Flutter Driver tests
        run: |
          flutter config --enable-windows-desktop 
          flutter test -d windows integration_test/IDRISDB_test.dart --dart-define STRESS=true
        working-directory: packages/idris_db_test

  build_darwin:
    name: Build Darwin XCFramework
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Build
        uses: ./.github/actions/prepare-build
      - name: Build Darwin XCFramework
        run: bash tool/build_darwin.sh
      - name: Upload XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: IDRISDBPlusCore.xcframework.zip
          path: IDRISDBPlusCore.xcframework.zip
          retention-days: 1

  integration_test_ios:
    name: Integration Test iOS
    runs-on: macos-latest
    needs: build_darwin
    steps:
      - uses: actions/checkout@v4

      - name: Start simulator
        uses: futureware-tech/simulator-action@v4
        id: simulator
        with:
          model: iPhone 17 Pro

      - uses: subosito/flutter-action@v2
        with:
          cache: true

      - name: Prepare Build
        uses: ./.github/actions/prepare-build

      - name: Download XCFramework
        uses: actions/download-artifact@v4
        with:
          name: IDRISDBPlusCore.xcframework.zip
          path: .

      - name: Extract XCFramework
        run: |
          echo "Extracting XCFramework..."
          unzip -o IDRISDBPlusCore.xcframework.zip -d packages/idris_db_flutter_libs/darwin/idris_db_flutter_libs/Core/
          ls -lh packages/idris_db_flutter_libs/darwin/idris_db_flutter_libs/Core/

      - name: Prepare Tests
        run: sh tool/prepare_tests.sh

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          df -h

      - name: Run Flutter Integration tests
        run: |
          # Enable SPM
          flutter config --enable-swift-package-manager
          # Patch Package.swift to use local path for testing
          sed -i '' 's/url: ".*"/path: "Core\/IDRISDBPlusCore.xcframework"/' ../idris_db_flutter_libs/darwin/idris_db_flutter_libs/Package.swift
          sed -i '' '/checksum: .*/d' ../idris_db_flutter_libs/darwin/idris_db_flutter_libs/Package.swift
          
          # Get the specific device ID from the simulator action
          DEVICE_ID="${{ steps.simulator.outputs.udid }}"
          echo "Using device ID: $DEVICE_ID"
          
          # Wait for simulator to be fully ready
          xcrun simctl bootstatus "$DEVICE_ID" -b
          
          # Run tests with verbose logging
          flutter test --verbose -d "$DEVICE_ID" integration_test/IDRISDB_test.dart --dart-define STRESS=true --timeout 300s
        working-directory: packages/idris_db_test
